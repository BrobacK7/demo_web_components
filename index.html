<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio Components Standalone Example</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { 
      height: 100%; 
      overflow: hidden; 
      background: #f2f4f8;
      font-family: 'DM Sans', system-ui, sans-serif;
    }
    
    .container {
      display: flex;
      width: 100%;
      height: 100vh;
      gap: 20px;
      padding: 20px;
    }
    
    .section {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
    }
    
    .section h2 {
      font-size: 18px;
      color: #1f2937;
      margin-bottom: 8px;
    }
    
    .component-box {
      border: 1px solid #d4d9e2;
      border-radius: 8px;
      padding: 16px;
      background: #ffffff;
      min-height: 200px;
    }

    .component-box--player {
      min-height: 520px;
    }
  </style>
</head>
<body>

  <div class="container">
    
    <!-- Column 1: Audio Playback -->
    <div class="section">
      <h2>🎵 Audio Playback</h2>
      
      <div class="component-box">
        <p style="color: #666; font-size: 12px; margin-bottom: 8px;">Shared Audio Context</p>
        <audio-bus></audio-bus>
      </div>
      
      <div class="component-box component-box--player">
        <audio-player
          tracks='[{"src":"https://broback7.github.io/projet_web_component/assets/demo/sonic.mp3","title":"Sonic","artist":"Demo"},{"src":"https://broback7.github.io/projet_web_component/assets/demo/sonic.mp3?v=2","title":"Sonic (Alt)","artist":"Demo"}]'
          autoadvance="true"
        ></audio-player>
      </div>
    </div>
    
    <!-- Column 2: Effects & Visualization -->
    <div class="section">
      <h2>🎚️ Effects & Visualization</h2>
      
      <div class="component-box">
        <audio-equalizer></audio-equalizer>
      </div>
      
      <div class="component-box">
        <audio-reverb preset="hall"></audio-reverb>
      </div>

      <div class="component-box">
        <audio-wam-effect
          src="https://broback7.github.io/projet_web_component/assets/wam/basic-drive-wam.js"
          mix="0.1"
        ></audio-wam-effect>
      </div>
    </div>
    
    <!-- Column 3: Monitoring -->
    <div class="section">
      <h2>📊 Monitoring</h2>
      
      <div class="component-box">
        <audio-visualizer mode="fft" fftsize="256"></audio-visualizer>
      </div>
    </div>
    
  </div>

  <script type="module">
    const COMPONENTS_BASE = 'https://broback7.github.io/projet_web_component/components/';

    const componentFiles = [
      'audio-bus.js',
      'audio-player.js',
      'audio-equalizer.js',
      'audio-visualizer.js',
      'audio-reverb.js',
      'audio-wam-effect.js',
    ];

    for (const file of componentFiles) {
      import(COMPONENTS_BASE + file).catch((err) => {
        console.error(`Failed to load ${file}:`, err);
      });
    }
  </script>

</body>
</html>
